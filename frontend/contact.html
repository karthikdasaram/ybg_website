<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us - Yash Body Grow Gym</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">YASH<span> BODY GROW</span></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="plans.html">Plans</a>
        <a href="trainers.html">Trainers</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
        <a href="pages/login.html">Login</a>
        <a href="pages/register.html" class="btn btn-primary btn-sm">Join Now</a>
      </div>
    </div>
  </nav>

  <section class="section">
    <div class="container" style="max-width:640px;">
      <div class="section-title">
        <h2>Get In Touch</h2>
        <p>Have a question? Reach out and our team will get back to you.</p>
      </div>
      <div class="card">
        <form id="contact-form">
          <div class="form-group">
            <label>Your Name</label>
            <input type="text" id="c-name" required />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="c-email" required />
          </div>
          <div class="form-group">
            <label>Phone (optional)</label>
            <input type="text" id="c-phone" />
          </div>
          <div class="form-group">
            <label>Message</label>
            <textarea id="c-message" rows="5" required></textarea>
          </div>
          <div id="contact-error" class="error-msg"></div>
          <div id="contact-status" class="success-msg"></div>
          <button type="submit" class="btn btn-primary btn-block" id="contact-submit">Send Message</button>
        </form>
      </div>
      <p style="text-align:center;color:var(--gray);font-size:13px;margin-top:16px;">
        Or email us directly at info@yashbodygrowgym.example
      </p>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>&copy; 2026 Yash Body Grow Gym. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script>
    document.getElementById('contact-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errBox = document.getElementById('contact-error');
      const okBox = document.getElementById('contact-status');
      const btn = document.getElementById('contact-submit');
      hideMessage(errBox);
      hideMessage(okBox);
      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        await api.post('/contact', {
          name: document.getElementById('c-name').value.trim(),
          email: document.getElementById('c-email').value.trim(),
          phone: document.getElementById('c-phone').value.trim(),
          message: document.getElementById('c-message').value.trim()
        });
        showMessage(okBox, "Thanks! Your message has been received. We'll get back to you soon.", false);
        e.target.reset();
      } catch (err) {
        showMessage(errBox, err.message || 'Could not send your message. Please try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Message';
      }
    });
  </script>
</body>

</html>
