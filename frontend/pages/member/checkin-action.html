<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Processing Check-in...</title>
    <link rel="stylesheet" href="../../css/style.css" />
    <style>
        body {
            background: linear-gradient(135deg, var(--dark) 0%, #2c1810 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
            text-align: center;
        }

        .action-card {
            background: #fff;
            color: var(--dark);
            border-radius: var(--radius);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow);
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 20px;
        }

        .icon.loading {
            background: #eee;
            color: var(--gray);
            animation: spin 1s linear infinite;
        }

        .icon.success {
            background: #e9f9ee;
            color: var(--success);
        }

        .icon.warning {
            background: #fef5e7;
            color: var(--warning);
        }

        .icon.error {
            background: #fdecea;
            color: var(--danger);
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        h2 {
            margin-bottom: 10px;
        }

        p {
            color: var(--gray);
            margin-bottom: 24px;
        }

        #action-duration {
            font-size: 14px;
            font-weight: 600;
            color: #3498db;
            margin-bottom: 24px;
        }
    </style>
</head>

<body>
    <div class="action-card" id="card">
        <div class="icon loading" id="icon">↻</div>
        <h2 id="title">Please wait...</h2>
        <p id="message">Recording your attendance.</p>
        <div id="action-duration"></div>
        <a href="dashboard.html" class="btn btn-dark btn-block" style="display:none;" id="btn">Go to Dashboard</a>
    </div>

    <script src="../../js/api.js"></script>
    <script src="../../js/admin.js"></script>
    <script>
        // Enforce login. If the member scans the code but isn't logged in, they will be redirected to login.
        // Once they log in, they will land on the dashboard, so ideally we would use a returnUrl parameter,
        // but for simplicity, requiring login is the baseline. 
        requireMember();

        async function processPunch() {
            const icon = document.getElementById('icon');
            const title = document.getElementById('title');
            const message = document.getElementById('message');
            const duration = document.getElementById('action-duration');
            const btn = document.getElementById('btn');

            try {
                // Call the new self-punch API endpoint
                const res = await api.post('/attendance/self-punch');

                icon.classList.remove('loading');
                btn.style.display = 'inline-block';

                if (res.action === 'in') {
                    icon.classList.add('success');
                    icon.textContent = '✓';
                    title.textContent = 'Checked In!';
                    message.textContent = res.message;
                } else if (res.action === 'out') {
                    icon.classList.add('success');
                    icon.textContent = '↩';
                    title.textContent = 'Checked Out!';
                    message.textContent = res.message;
                    if (res.durationMinutes != null) {
                        duration.textContent = 'Session duration: ' + formatDuration(res.durationMinutes);
                    }
                } else if (res.action === 'already-done') {
                    icon.classList.add('warning');
                    icon.textContent = '⏱';
                    title.textContent = 'Already Done';
                    message.textContent = res.message;
                }
            } catch (err) {
                icon.classList.remove('loading');
                icon.classList.add('error');
                icon.textContent = '✕';
                title.textContent = 'Failed';
                message.textContent = err.message || 'Something went wrong. Please try again or contact the front desk.';
                btn.style.display = 'inline-block';
            }
        }

        function formatDuration(minutes) {
            if (minutes == null) return '';
            if (minutes < 60) return `${minutes} min`;
            const h = Math.floor(minutes / 60);
            const m = minutes % 60;
            return m > 0 ? `${h}h ${m}m` : `${h}h`;
        }

        // Add a slight delay just for UI smoothing
        setTimeout(processPunch, 600);
    </script>
</body>

</html>
