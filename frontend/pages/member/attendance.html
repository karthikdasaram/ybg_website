<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Attendance - Yash Body Grow Gym</title>
  <link rel="stylesheet" href="../../css/style.css" />
</head>

<body>

  <nav class="navbar">
    <div class="container">
      <a href="dashboard.html" class="logo">YASH<span> BODY GROW</span></a>
      <div class="nav-links">
        <span id="member-name" style="opacity:.8;font-size:14px;"></span>
        <a href="#" id="logout-link" class="btn btn-outline btn-sm" style="color:#fff;border-color:#fff;">Logout</a>
      </div>
    </div>
  </nav>

  <div class="dash-layout">
    <aside class="sidebar">
      <a href="dashboard.html">My Dashboard</a>
      <a href="attendance.html" class="active">My Attendance</a>
      <a href="payments.html">My Payments</a>
      <a href="../settings.html">Change Password</a>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>My Attendance</h1>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Status</th>
              <th>Check In</th>
              <th>Check Out</th>
              <th>Duration</th>
              <th>Source</th>
            </tr>
          </thead>
          <tbody id="attendance-tbody">
            <tr>
              <td colspan="6" class="empty-state">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="../../js/api.js"></script>
  <script src="../../js/admin.js"></script>
  <script>
    requireMember();
    document.getElementById('member-name').textContent = Auth.getUser()?.name || '';
    document.getElementById('logout-link').addEventListener('click', (e) => { e.preventDefault(); Auth.logout(); });

    function fmtTime(d) {
      if (!d) return '—';
      return new Date(d).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
    }
    function fmtDuration(inTime, outTime) {
      if (!inTime || !outTime) return '—';
      const mins = Math.round((new Date(outTime) - new Date(inTime)) / 60000);
      if (mins < 60) return `${mins} min`;
      const h = Math.floor(mins / 60), m = mins % 60;
      return m > 0 ? `${h}h ${m}m` : `${h}h`;
    }

    async function loadAttendance() {
      const tbody = document.getElementById('attendance-tbody');
      try {
        const data = await api.get('/attendance/me');
        const records = data.attendance || [];
        if (!records.length) {
          tbody.innerHTML = `<tr><td colspan="6" class="empty-state">No attendance recorded yet.</td></tr>`;
          return;
        }
        tbody.innerHTML = records.map(r => `
        <tr>
          <td>${formatDate(r.date)}</td>
          <td><span class="badge badge-${r.status}">${r.status}</span></td>
          <td>${fmtTime(r.checkInTime)}</td>
          <td>${fmtTime(r.checkOutTime)}</td>
          <td>${fmtDuration(r.checkInTime, r.checkOutTime)}</td>
          <td><span class="badge" style="background:${r.source === 'kiosk' ? '#eef5ff;color:#2980b9' : '#f0f0f0;color:#666'}">${r.source || 'admin'}</span></td>
        </tr>
      `).join('');
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="6" class="empty-state">Error: ${err.message}</td></tr>`;
      }
    }
    loadAttendance();
  </script>
</body>

</html>
