<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trainer Dashboard - Yash Body Grow Gym</title>
    <link rel="stylesheet" href="../../css/style.css" />
</head>

<body>

    <nav class="navbar">
        <div class="container">
            <a href="dashboard.html" class="logo">YASH<span> BODY GROW</span> <small
                    style="font-size:12px;opacity:.6;">TRAINER</small></a>
            <div class="nav-links">
                <span id="trainer-name" style="opacity:.8;font-size:14px;"></span>
                <a href="#" id="logout-link" class="btn btn-outline btn-sm"
                    style="color:#fff;border-color:#fff;">Logout</a>
            </div>
        </div>
    </nav>

    <div class="dash-layout">
        <aside class="sidebar">
            <a href="dashboard.html" class="active">Dashboard</a>
            <a href="members.html">My Members</a>
            <a href="workouts.html">Workout Plans</a>
            <a href="diets.html">Diet Plans</a>
            <a href="progress.html">Progress Tracking</a>
            <a href="schedule.html">My Schedule</a>
            <a href="../settings.html">Change Password</a>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>Welcome back</h1>
            </div>

            <div id="profile-card" class="card" style="margin-bottom:24px;">
                <div class="empty-state">Loading your profile...</div>
            </div>

            <div class="card">
                <h3 style="margin-bottom:14px;">Quick Actions</h3>
                <div style="display:flex;gap:12px;flex-wrap:wrap;">
                    <a href="members.html" class="btn btn-primary btn-sm">View My Members</a>
                    <a href="workouts.html" class="btn btn-dark btn-sm">+ Workout Plan</a>
                    <a href="diets.html" class="btn btn-dark btn-sm">+ Diet Plan</a>
                    <a href="progress.html" class="btn btn-dark btn-sm">Log Progress</a>
                    <a href="schedule.html" class="btn btn-dark btn-sm">Manage Schedule</a>
                </div>
            </div>
        </main>
    </div>

    <script src="../../js/api.js"></script>
    <script src="../../js/admin.js"></script>
    <script>
        requireTrainer();
        document.getElementById('trainer-name').textContent = Auth.getUser()?.name || '';
        document.getElementById('logout-link').addEventListener('click', (e) => { e.preventDefault(); Auth.logout(); });

        async function loadProfile() {
            const card = document.getElementById('profile-card');
            try {
                const data = await api.get('/trainers/me/profile');
                const t = data.trainer;
                const membersData = await api.get('/trainers/me/members');

                card.innerHTML = `
        <h3>${t.name}</h3>
        <p style="color:var(--primary);font-weight:600;margin:4px 0;">${t.specialization || 'General Fitness'}</p>
        <p style="color:#666;font-size:14px;">${t.experienceYears || 0} years experience</p>
        <div style="margin-top:16px;font-size:14px;"><strong>Assigned Members:</strong> ${membersData.count}</div>
      `;
            } catch (err) {
                card.innerHTML = `<div class="empty-state">Error loading profile: ${err.message}</div>`;
            }
        }
        loadProfile();
    </script>
</body>

</html>
