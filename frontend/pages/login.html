<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Yash Body Grow Gym</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>

  <nav class="navbar">
    <div class="container">
      <a href="../index.html" class="logo">YASH<span> BODY GROW</span></a>
      <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="../plans.html">Plans</a>
        <a href="../trainers.html">Trainers</a>
      </div>
    </div>
  </nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <h2>Welcome Back</h2>
      <p class="sub">Log in to your YASH BODY GROW account</p>

      <div id="error-box" class="error-msg"></div>

      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Log In</button>
      </form>

      <p class="auth-footer">
        Don't have an account? <a href="register.html" style="color:var(--primary);font-weight:600;">Sign up</a>
      </p>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    // If already logged in, skip straight to the right dashboard (or returnUrl)
    if (Auth.isLoggedIn()) {
      const urlParams = new URLSearchParams(window.location.search);
      const returnUrl = urlParams.get('returnUrl');
      window.location.href = returnUrl ? decodeURIComponent(returnUrl) : homeForRole(Auth.getUser());
    }

    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('error-box');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessage(errorBox);
      submitBtn.disabled = true;
      submitBtn.textContent = 'Logging in...';

      try {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        const data = await api.post('/auth/login', { email, password });
        Auth.setSession(data.token, data.user);

        const urlParams = new URLSearchParams(window.location.search);
        const returnUrl = urlParams.get('returnUrl');
        window.location.href = returnUrl ? decodeURIComponent(returnUrl) : homeForRole(data.user);
      } catch (err) {
        showMessage(errorBox, err.message || 'Login failed');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log In';
      }
    });
  </script>
</body>

</html>
