<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery - Yash Body Grow Gym</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">YASH<span> BODY GROW</span></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="plans.html">Plans</a>
        <a href="trainers.html">Trainers</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
        <a href="pages/login.html">Login</a>
        <a href="pages/register.html" class="btn btn-primary btn-sm">Join Now</a>
      </div>
    </div>
  </nav>

  <section class="section">
    <div class="container">
      <div class="section-title">
        <h2>Gym Gallery</h2>
        <p>A look inside Yash Body Grow</p>
      </div>
      <div id="gallery-grid" class="grid grid-4">
        <div class="empty-state">Loading gallery...</div>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>&copy; 2026 Yash Body Grow Gym. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script>
    async function loadGallery() {
      const el = document.getElementById('gallery-grid');
      try {
        const data = await api.get('/gallery');
        const items = data.gallery || [];
        if (!items.length) {
          el.innerHTML = '<div class="empty-state">Gallery coming soon.</div>';
          return;
        }
        el.innerHTML = items.map(i => `
        <div class="card" style="padding:0;overflow:hidden;">
          ${i.mediaType === 'image'
            ? `<img src="${i.url}" alt="${i.title || ''}" style="width:100%;height:180px;object-fit:cover;" onerror="this.parentElement.style.display='none'"/>`
            : `<a href="${i.url}" target="_blank" style="display:flex;align-items:center;justify-content:center;height:180px;background:#111;color:#fff;font-size:13px;">Watch Video</a>`}
          ${i.title ? `<div style="padding:10px;font-size:13px;font-weight:600;">${i.title}</div>` : ''}
        </div>
      `).join('');
      } catch (err) {
        el.innerHTML = `<div class="empty-state">Could not load gallery right now.</div>`;
      }
    }
    loadGallery();
  </script>
</body>

</html>
